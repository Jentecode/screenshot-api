services:
  cache:
    image: redis:7.4-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - cache:/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      cache:  
        condition: service_started
    environment: 
      - "REDIS_URL=redis://cache:6379"

volumes:
  cache:
    driver: local